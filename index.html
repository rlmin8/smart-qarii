
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Qari - القارئ الذكي</title>
    
    <style>
        /* ====== الألوان والتنسيق (CSS) ====== */
        :root {
            --brown-dark: #5C3A21;
            --brown: #7B4F2A;
            --brown-light: #B08968;
            --beige: #F1E3D3;
            --cream: #FBF7F2;
            --white: #FFFFFF;
            --border: #E6D5C3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--cream);
            color: var(--brown-dark);
            font-family: system-ui, -apple-system, sans-serif;
        }

        .wrap {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            direction: rtl;
        }

        h2 { margin: 5px 0; color: var(--brown-dark); }
        .sub { color: var(--brown-light); margin-bottom: 15px; }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: var(--brown);
            color: white;
        }

        .btn.ghost { background: var(--beige); color: var(--brown-dark); }
        .btn.primary { background: #27ae60; color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .pill {
            padding: 5px 12px;
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.9em;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.2em;
            resize: vertical;
            margin-top: 10px;
            font-family: inherit;
        }

        .hint { font-size: 0.85em; color: #888; margin-top: 5px; }
        .warn { color: #e67e22; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="wrap">
        <h2>📖 قياس مستوى القراءة (تجريبي)</h2>
        <p class="sub">يسجل صوتك ويحسب سرعة القراءة (WPM) + دقة التطابق.</p>

        <section class="card">
            <h3>1) اختر نصًا للقراءة</h3>
            <div class="row">
                <button class="btn ghost" onclick="loadText(0)">نص سهل</button>
                <button class="btn ghost" onclick="loadText(1)">نص متوسط</button>
                <button class="btn ghost" onclick="loadText(2)">نص عالي</button>
            </div>

            <div class="row controls">
                <span class="label">حجم الخط</span>
                <button class="btn" id="fontDec" type="button">A-</button>
                <button class="btn" id="fontInc" type="button">A+</button>
                <span class="pill" id="fontSizeLabel">18px</span>
            </div>

            <textarea id="target"></textarea>
        </section>

        <section class="card">
            <h3>2) سجّل قراءتك</h3>
            <p id="supportMsg" class="warn"></p>

            <div class="row">
                <button class="btn primary" id="startBtn" type="button">🎙️ ابدأ التسجيل</button>
                <button class="btn" id="stopBtn" type="button" disabled>⏹️ إيقاف</button>
                <span class="pill" id="status">الحالة: جاهز</span>
            </div>

            <p class="hint">بعد الإيقاف سيظهر تفريغ الصوت أدناه:</p>
            <textarea id="spoken" placeholder="هنا سيظهر ما تقوله..."></textarea> 
        </section>
    </div>

    <script>
        const texts = [
            "ذهب محمد إلى المدرسة في الصباح الباكر وكان سعيداً جداً بلقاء أصدقائه.",
            "تعتبر القراءة من أهم المهارات التي يجب على الإنسان تطويرها لزيادة معرفته وثقافته.",
            "إن استكشاف الفضاء الخارجي يمثل تحدياً كبيراً ويتطلب تقنيات متطورة وتعاوناً دولياً."
        ];

        const targetEl = document.getElementById('target');
        const spokenEl = document.getElementById('spoken');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const supportMsg = document.getElementById('supportMsg');
        const fontSizeLabel = document.getElementById('fontSizeLabel');

        let currentSize = 18;

        // دالة تغيير حجم الخط
        document.getElementById('fontInc').onclick = () => {
            currentSize += 2;
            targetEl.style.fontSize = currentSize + 'px';
            fontSizeLabel.textContent = currentSize + 'px';
        };
        document.getElementById('fontDec').onclick = () => {
            if(currentSize > 12) currentSize -= 2;
            targetEl.style.fontSize = currentSize + 'px';
            fontSizeLabel.textContent = currentSize + 'px';
        };

        function loadText(i) {
            targetEl.value = texts[i];
            spokenEl.value = "";
            statusEl.textContent = "الحالة: جاهز";
        }

        // إعدادات التعرف على الكلام
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            supportMsg.textContent = "⚠️ المتصفح الحالي لا يدعم التسجيل. جرب Google Chrome.";
            startBtn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = true;
            recognition.interimResults = true;

            startBtn.onclick = () => {
                recognition.start();
                statusEl.textContent = "الحالة: جاري الاستماع...";
                startBtn.disabled = true;
                stopBtn.disabled = false;
                spokenEl.value = "";
            };

            stopBtn.onclick = () => {
                recognition.stop();
                statusEl.textContent = "الحالة: تم الإيقاف.";
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        spokenEl.value += event.results[i][0].transcript + " ";
                    }
                }
            };

            recognition.onerror = (event) => {
                statusEl.textContent = "خطأ: " + event.error;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };
        }

        window.onload = () => loadText(0);
    </script>
</body>
</html>
