
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Qari - القارئ الذكي</title>
    
    <style>
        :root {
            --brown-dark: #5C3A21;
            --brown: #7B4F2A;
            --brown-light: #B08968;
            --beige: #F1E3D3;
            --cream: #FBF7F2;
            --white: #FFFFFF;
            --border: #E6D5C3;
            --success: #27ae60;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--cream);
            color: var(--brown-dark);
            font-family: system-ui, -apple-system, sans-serif;
        }

        .wrap {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            direction: rtl;
        }

        h2 { margin: 5px 0; color: var(--brown-dark); }
        .sub { color: var(--brown-light); margin-bottom: 15px; }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* لوحة النتائج الذكية */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .result-item {
            background: var(--beige);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .result-value {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: var(--brown-dark);
        }

        .result-label { font-size: 0.8em; color: var(--brown); }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: var(--brown);
            color: white;
        }

        .btn.ghost { background: var(--beige); color: var(--brown-dark); }
        .btn.primary { background: var(--success); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .pill {
            padding: 5px 12px;
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.9em;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.2em;
            resize: vertical;
            font-family: inherit;
        }

        .warn { color: #e67e22; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="wrap">
        <h2>📖 Smart Qari - القارئ الذكي</h2>
        <p class="sub">نظام ذكي لتحليل جودة وقوة القراءة العربية.</p>

        <section class="card">
            <h3>1) النص المطلوب</h3>
            <div class="row">
                <button class="btn ghost" onclick="loadText(0)">نص سهل</button>
                <button class="btn ghost" onclick="loadText(1)">نص متوسط</button>
                <button class="btn ghost" onclick="loadText(2)">نص متقدم</button>
            </div>
            <textarea id="target"></textarea>
        </section>

        <section class="card">
            <h3>2) تسجيل القراءة</h3>
            <p id="supportMsg" class="warn"></p>
            <div class="row">
                <button class="btn primary" id="startBtn">🎙️ ابدأ التسجيل</button>
                <button class="btn" id="stopBtn" disabled>⏹️ إيقاف وتحليل</button>
                <span class="pill" id="timer">00:00</span>
                <span class="pill" id="status">جاهز</span>
            </div>
            <textarea id="spoken" placeholder="سيظهر تفريغ صوتك هنا..."></textarea> 
        </section>

        <section class="card">
            <h3>3) التحليل الذكي للنتائج</h3>
            <div class="results-grid">
                <div class="result-item">
                    <span class="result-label">السرعة (كلمة/د)</span>
                    <span class="result-value" id="wpm">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">الدقة المئوية</span>
                    <span class="result-value" id="accuracy">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">التقييم العام</span>
                    <span class="result-value" id="level">-</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const texts = [
            "ذهب محمد إلى المدرسة في الصباح الباكر وكان سعيداً جداً.",
            "تعتبر القراءة من أهم المهارات التي يجب على الإنسان تطويرها باستمرار.",
            "إن استكشاف الفضاء يمثل تحدياً كبيراً يتطلب تقنيات متطورة وتعاوناً دولياً."
        ];

        const targetEl = document.getElementById('target');
        const spokenEl = document.getElementById('spoken');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerEl = document.getElementById('timer');
        
        // عناصر النتائج
        const wpmVal = document.getElementById('wpm');
        const accVal = document.getElementById('accuracy');
        const levelVal = document.getElementById('level');

        let startTime, timerInterval;

        function loadText(i) {
            targetEl.value = texts[i];
            spokenEl.value = "";
            resetResults();
        }

        function resetResults() {
            wpmVal.innerText = "-";
            accVal.innerText = "-";
            levelVal.innerText = "-";
        }

        // إعداد الميكروفون
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('supportMsg').innerText = "⚠️ المتصفح لا يدعم التسجيل. استخدم Chrome.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = true;

            startBtn.onclick = () => {
                recognition.start();
                startTime = Date.now();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusEl.innerText = "جاري الاستماع...";
                spokenEl.value = "";
                startTimer();
            };

            stopBtn.onclick = () => {
                recognition.stop();
                stopBtn.disabled = true;
                startBtn.disabled = false;
                statusEl.innerText = "تم التحليل.";
                clearInterval(timerInterval);
                calculateResults();
            };

            recognition.onresult = (event) => {
                let text = "";
                for (let i = 0; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                spokenEl.value = text;
            };
        }

        function startTimer() {
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerEl.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function calculateResults() {
            const original = targetEl.value.trim().split(/\s+/);
            const recorded = spokenEl.value.trim().split(/\s+/);
            const timeTaken = (Date.now() - startTime) / 1000 / 60; // بالدقائق

            // 1. حساب السرعة
            const wpm = Math.round(recorded.length / timeTaken) || 0;
            wpmVal.innerText = wpm;

            // 2. حساب الدقة (بسيط)
            let matches = 0;
            recorded.forEach(word => {
                if (targetEl.value.includes(word)) matches++;
            });
            const accuracy = Math.round((matches / original.length) * 100);
            accVal.innerText = (accuracy > 100 ? 100 : accuracy) + "%";

            // 3. تحديد المستوى
            if (accuracy > 85 && wpm > 40) levelVal.innerText = "طلّاقـة";
            else if (accuracy > 60) levelVal.innerText = "متوسط";
            else levelVal.innerText = "مبتدئ";
        }

        window.onload = () => loadText(0);
    </script>
</body>
</html>
