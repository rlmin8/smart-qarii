<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Qari - القارئ الذكي</title>
    
    <style>
        :root {
            --brown-dark: #5C3A21;
            --brown: #7B4F2A;
            --brown-light: #B08968;
            --beige: #F1E3D3;
            --cream: #FBF7F2;
            --white: #FFFFFF;
            --border: #E6D5C3;
            --success: #27ae60;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--cream);
            color: var(--brown-dark);
            font-family: system-ui, -apple-system, sans-serif;
            direction: rtl;
            text-align: right;
        }

        .wrap {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h2 { text-align: center; color: var(--brown-dark); }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: var(--brown);
            color: white;
        }

        .btn.ghost { background: var(--beige); color: var(--brown-dark); }
        .btn.primary { background: var(--success); color: white; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.4em;
            resize: none;
            direction: rtl;
            text-align: right;
            line-height: 1.6;
            background: #fff;
        }

        /* تمييز الخانة التي يمكن الكتابة فيها */
        #target {
            border: 2px solid var(--beige);
            background: var(--white);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .result-item {
            background: var(--beige);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .result-value {
            display: block;
            font-size: 1.4em;
            font-weight: bold;
            color: var(--brown-dark);
        }

        .result-label { font-size: 0.8em; color: var(--brown); font-weight: bold; }
        
        .hint {
            font-size: 0.85em;
            color: var(--brown-light);
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wrap">
        <h2>📖 Smart Qari - القارئ الذكي</h2>

        <section class="card">
            <h3>1) اختر نصاً أو اكتب نصك الخاص</h3>
            <span class="hint">* يمكنك مسح النص أدناه وكتابة أي نص تريد التدرب عليه.</span>
            <div class="row">
                <button class="btn ghost" onclick="loadText(0)">مبتدئ</button>
                <button class="btn ghost" onclick="loadText(1)">متوسط</button>
                <button class="btn ghost" onclick="loadText(2)">متقدم</button>
            </div>
            <textarea id="target" placeholder="اكتب أو الصق نصك هنا للتدرب عليه..."></textarea>
        </section>

        <section class="card">
            <h3>2) ابدأ القراءة</h3>
            <div class="row">
                <button class="btn primary" id="startBtn">🎙️ ابدأ التسجيل</button>
                <button class="btn" style="background:#e74c3c" id="stopBtn" disabled>⏹️ إيقاف وتحليل</button>
                <span id="timer" style="font-weight:bold">00:00</span>
            </div>
            <textarea id="spoken" placeholder="سيظهر كلامك المسجل هنا..." readonly></textarea> 
        </section>

        <section class="card">
            <h3>3) النتائج</h3>
            <div class="results-grid">
                <div class="result-item">
                    <span class="result-label">الكلمات/د</span>
                    <span class="result-value" id="wpm">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">الدقة</span>
                    <span class="result-value" id="accuracy">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">المستوى</span>
                    <span class="result-value" id="level">-</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const texts = [
            "تُعد المملكة العربية السعودية قبلة المسلمين وأرض الحرمين الشريفين، وهي تشهد اليوم نهضةً تنموية شاملة تستهدف بناء مستقبل واعد للأجيال القادمة.",
            "إن الجهود الوطنية الحثيثة لتكريس مفاهيم الاستدامة البيئية والحفاظ على الموارد الطبيعية، نجحت في تحويل المساحات الشاسعة إلى واحات غناء تعكس بجلاء إرادة الإنسان السعودي وعزمه على التطوير والبناء المستمر.",
            "إن هذا التمازج الفريد بين عبق الأصالة التاريخية العريقة والقفزات التقنية المتسارعة في شتى المجالات، يبرهن للعالم أجمع على مرونة الهوية الوطنية وقدرتها الفائقة على استيعاب أعقد معطيات الحداثة المعاصرة، مع التمسك الصارم بالقيم الروحية والمبادئ الراسخة التي صاغت وجدان هذا الكيان العظيم عبر الأزمان المتعاقبة."
        ];

        const targetEl = document.getElementById('target');
        const spokenEl = document.getElementById('spoken');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerEl = document.getElementById('timer');
        
        let startTime, timerInterval;

        function loadText(i) {
            targetEl.value = texts[i];
            spokenEl.value = "";
            resetResults();
        }

        function resetResults() {
            document.getElementById('wpm').innerText = "-";
            document.getElementById('accuracy').innerText = "-";
            document.getElementById('level').innerText = "-";
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = true;
            recognition.interimResults = true;

            startBtn.onclick = () => {
                if(!targetEl.value.trim()) {
                    alert("الرجاء كتابة نص أولاً!");
                    return;
                }
                recognition.start();
                startTime = Date.now();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                startTimer();
                spokenEl.value = "";
            };

            stopBtn.onclick = () => {
                recognition.stop();
                stopBtn.disabled = true;
                startBtn.disabled = false;
                clearInterval(timerInterval);
                calculateResults();
            };

            recognition.onresult = (event) => {
                let t = "";
                for (let i = 0; i < event.results.length; i++) {
                    t += event.results[i][0].transcript;
                }
                spokenEl.value = t;
            };
        }

        function startTimer() {
            let s = 0;
            timerInterval = setInterval(() => {
                s++;
                let min = Math.floor(s/60).toString().padStart(2,'0');
                let sec = (s%60).toString().padStart(2,'0');
                timerEl.innerText = min + ":" + sec;
            }, 1000);
        }

        function calculateResults() {
            const originalWords = targetEl.value.trim().split(/\s+/);
            const recordedWords = spokenEl.value.trim().split(/\s+/);
            const timeInMinutes = (Date.now() - startTime) / 60000;

            const wpm = Math.round(recordedWords.length / timeInMinutes) || 0;
            let matches = 0;
            
            // مقارنة الكلمات المسموعة بالنص الموجود في الخانة
            recordedWords.forEach(word => {
                if (targetEl.value.includes(word) && word.length > 2) matches++;
            });
            
            const acc = Math.min(Math.round((matches / originalWords.length) * 100), 100);

            document.getElementById('wpm').innerText = wpm;
            document.getElementById('accuracy').innerText = acc + "%";
            document.getElementById('level').innerText = acc > 80 ? "متقدم" : acc > 50 ? "متوسط" : "مبتدئ";
        }

        window.onload = () => loadText(0);
    </script>
</body>
</html>
